<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заказ товаров</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.72);
            --glass-border: rgba(255, 255, 255, 0.5);
            --glass-shadow: rgba(0, 0, 0, 0.06);
            --text-primary: #1d1d1f;
            --text-secondary: #6e6e73;
            --accent: #0071e3;
            --accent-soft: rgba(0, 113, 227, 0.12);
            --danger: #ff3b30;
            --danger-soft: rgba(255, 59, 48, 0.12);
            --success: #34c759;
            --success-soft: rgba(52, 199, 89, 0.15);
            --radius: 16px;
            --radius-sm: 12px;
            --radius-pill: 999px;
            --stock-low: #ffcc00; /* Yellow for low stock */
            --stock-ok: #34c759;  /* Green for good stock */
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --glass-bg: rgba(44, 44, 46, 0.72);
                --glass-border: rgba(255, 255, 255, 0.08);
                --glass-shadow: rgba(0, 0, 0, 0.3);
                --text-primary: #f5f5f7;
                --text-secondary: #a1a1a6;
                --accent: #0a84ff;
                --accent-soft: rgba(10, 132, 255, 0.2);
            }
        }
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #f5f5f7);
            color: var(--tg-theme-text-color, var(--text-primary));
            margin: 0;
            padding: 0;
            min-height: 100vh;
            padding-bottom: env(safe-area-inset-bottom, 0);
        }
        .page-header {
            position: sticky;
            top: 0;
            z-index: 50;
            padding: 16px 20px 20px;
            padding-top: calc(12px + env(safe-area-inset-top, 0));
            background: var(--glass-bg);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: 0 1px 0 var(--glass-shadow);
        }
        .page-header h2 {
            margin: 0;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.02em;
            text-align: center;
            color: inherit;
        }
        #catalog {
            padding: 12px 16px 120px;
        }
        .item {
            display: flex;
            flex-direction: column; /* Изменено на столбец для лучшего размещения */
            margin-bottom: 10px;
            padding: 14px 16px;
            gap: 8px; /* Уменьшен разрыв */
            background: var(--glass-bg);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            box-shadow: 0 2px 8px var(--glass-shadow);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .item:active {
            transform: scale(0.99);
        }
        .item-main-info {
            display: flex;
            align-items: center;
            justify-content: space-between; /* Распределение элементов */
            width: 100%;
        }
        .info {
            flex: 1;
            min-width: 0;
        }
        .name {
            font-weight: 500;
            font-size: 15px;
            line-height: 1.35;
            margin-bottom: 4px;
            color: inherit;
        }
        .price {
            font-size: 15px;
            font-weight: 600;
            color: var(--accent);
            white-space: nowrap; /* Цена не переносится */
        }
        .stock {
            font-size: 13px;
            color: var(--text-secondary);
            text-align: right;
            margin-top: 4px; /* Небольшой отступ сверху */
        }
        .stock.low {
            color: var(--danger);
            font-weight: 500;
        }
        .stock.critical {
            color: var(--danger);
            font-weight: 600;
            text-shadow: 0 0 3px rgba(255, 59, 48, 0.4);
        }

        .controls-wrapper {
            display: flex;
            align-items: center;
            justify-content: flex-end; /* Выравнивание элементов управления вправо */
            width: 100%;
            gap: 6px;
            margin-top: 8px; /* Отступ сверху для элементов управления */
        }

        button.btn-ctrl {
            width: 34px;
            height: 34px;
            border: none;
            border-radius: var(--radius-pill);
            color: white;
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            touch-action: manipulation;
            transition: transform 0.15s ease, opacity 0.15s ease;
        }
        button.btn-ctrl:active {
            transform: scale(0.92);
        }
        .btn-clear {
            background: var(--text-secondary);
            font-size: 16px;
            opacity: 0.9;
        }
        .btn-minus {
            background: var(--danger);
            box-shadow: 0 2px 8px rgba(255, 59, 48, 0.35);
        }
        .btn-plus1 {
            background: var(--accent);
            box-shadow: 0 2px 8px rgba(0, 113, 227, 0.35);
        }
        .btn-plus10 {
            background: var(--success);
            box-shadow: 0 2px 8px rgba(52, 199, 89, 0.35);
            font-size: 15px;
        }
        .count {
            font-weight: 600;
            min-width: 28px;
            text-align: center;
            font-size: 17px;
            color: inherit;
        }
        #send-btn {
            position: fixed;
            bottom: calc(20px + env(safe-area-inset-bottom, 0));
            left: 16px;
            right: 16px;
            padding: 16px 24px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -0.02em;
            display: none;
            box-shadow: 0 4px 20px rgba(52, 199, 89, 0.4);
            z-index: 100;
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        #send-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <header class="page-header">
        <h2>Выберите товары</h2>
    </header>
    <div id="catalog"></div>
    <button id="send-btn">Оформить заказ</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let products = []; // Будет загружено из параметров URL
        let cart = {}; // name → количество

        const catalogDiv = document.getElementById('catalog');
        const sendBtn = document.getElementById('send-btn');

        // Функция для парсинга параметров URL
        function getQueryParams() {
            const params = {};
            const queryString = window.location.search.substring(1);
            const regex = /([^&=]+)=([^&]*)/g;
            let m;
            while (m = regex.exec(queryString)) {
                params[decodeURIComponent(m[1])] = decodeURIComponent(m[2]);
            }
            return params;
        }

        // Загрузка товаров из параметра 'data' в URL
        const queryParams = getQueryParams();
        if (queryParams.data) {
            try {
                const appData = JSON.parse(queryParams.data);
                if (appData.products && Array.isArray(appData.products)) {
                    products = appData.products;
                    console.log("Загружены товары из URL:", products);
                }
            } catch (e) {
                console.error("Ошибка парсинга данных из URL:", e);
                // Fallback или сообщение об ошибке пользователю
            }
        }

        // Если товары не были загружены из URL, можно использовать пустой массив или какой-то дефолт
        if (products.length === 0) {
            console.warn("Товары не были загружены из URL. Каталог может быть пустым.");
        }


        products.forEach((p, index) => {
            const div = document.createElement('div');
            div.className = 'item';

            // Определяем класс для остатка
            let stockClass = '';
            let stockText = `${p.stock} шт`;
            if (p.stock < 10 && p.stock > 0) {
                stockClass = 'low';
                stockText += ' (мало)';
            } else if (p.stock === 0) {
                stockClass = 'critical';
                stockText = 'Нет в наличии';
            }

            div.innerHTML = `
                <div class="item-main-info">
                    <div class="info">
                        <div class="name">${p.name}</div>
                        <div class="price">${p.price.toFixed(2).replace(/\.00$/, '')} сом</div>
                    </div>
                    <div class="stock ${stockClass}">Остаток: ${stockText}</div>
                </div>
                <div class="controls-wrapper">
                    <button class="btn-ctrl btn-clear" onclick="setQty(${index}, 0)">x</button>
                    <button class="btn-ctrl btn-minus" onclick="changeQty(${index}, -1)">−</button>
                    <span class="count" id="count-${index}">0</span>
                    <button class="btn-ctrl btn-plus1" onclick="changeQty(${index}, 1)">+</button>
                    <button class="btn-ctrl btn-plus10" onclick="changeQty(${index}, 10)">+10</button>
                </div>
            `;
            catalogDiv.appendChild(div);
        });

        function changeQty(index, delta) {
            const p = products[index];
            const name = p.name;
            let currentQty = cart[name] || 0;

            // Проверяем, не превышает ли новое количество остаток
            if (delta > 0 && (currentQty + delta) > p.stock) {
                alert(`Недостаточно товара "${name}". В наличии ${p.stock} шт.`);
                return; // Отменяем изменение количества
            }
            
            cart[name] = currentQty + delta;
            if (cart[name] < 0) cart[name] = 0;

            const countEl = document.getElementById(`count-${index}`);
            if (countEl) countEl.innerText = cart[name];

            updateSendButton();
        }

        function setQty(index, value) {
            const p = products[index];
            const name = p.name;

            // Проверяем, не превышает ли новое количество остаток
            if (value > p.stock) {
                alert(`Недостаточно товара "${name}". В наличии ${p.stock} шт.`);
                cart[name] = p.stock; // Устанавливаем максимальное доступное количество
            } else {
                cart[name] = value;
            }

            const countEl = document.getElementById(`count-${index}`);
            if (countEl) countEl.innerText = cart[name];

            updateSendButton();
        }

        function updateSendButton() {
            const hasItems = Object.values(cart).some(q => q > 0);
            sendBtn.style.display = hasItems ? 'block' : 'none';

            if (hasItems) {
                let total = 0;
                products.forEach(p => {
                    const qty = cart[p.name] || 0;
                    if (qty > 0) total += qty * p.price;
                });
                sendBtn.innerText = `Заказать на ${total.toFixed(2).replace(/\.00$/, '')} сом`;
            }
        }

        sendBtn.addEventListener('click', () => {
            let orderItems = [];
            for (let name in cart) {
                const qty = cart[name];
                if (qty > 0) {
                    const product = products.find(p => p.name === name);
                    if (product) {
                        orderItems.push({ name: name, quantity: qty, price: product.price }); // Добавляем цену для сохранения
                    }
                }
            }
            if (orderItems.length === 0) return;

            tg.sendData(JSON.stringify({ items: orderItems }));
            tg.close();
        });

        // Инициализация кнопки при загрузке
        updateSendButton();
    </script>
</body>
</html>
